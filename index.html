<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Calculadora Éxodo Safa Pro</title>
    <style>
        /* IMPORTACIÓN DE FUENTES RÚSTICAS */
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Special+Elite&display=swap');

        :root { 
            --color-vino: #6e1d3e; 
            --color-negro: #1a1a1a;
            --fondo-pergamino: #e4d8c1; 
            --borde-pergamino: #bfa57a;
            --primary: #2196F3;
            --fuente-titulo: 'MedievalSharp', cursive;
            --fuente-texto: 'Special Elite', cursive;
        }

        body { 
            font-family: var(--fuente-texto); 
            background-color: #5d4037;
            background-image: repeating-linear-gradient(rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 40px);
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
        }

        .container { 
            background: var(--fondo-pergamino); 
            max-width: 450px; 
            width: 100%;
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border: 3px solid var(--borde-pergamino);
            box-sizing: border-box;
        }

        h1 { 
            font-family: var(--fuente-titulo);
            text-align: center; 
            color: var(--color-negro); 
            font-size: 1.6rem; 
            margin-bottom: 15px; 
            border-bottom: 2px solid var(--color-vino); 
            padding-bottom: 8px; 
        }
        
        /* Sección de Nombre */
        .name-section { margin-bottom: 15px; text-align: center; }
        label.name-label { font-size: 0.8rem; font-weight: bold; color: var(--color-vino); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"]#input-nombre { 
            width: 100%; padding: 10px; border: 2px solid var(--borde-pergamino); border-radius: 5px; 
            font-size: 1.2rem; font-family: var(--fuente-titulo); text-align: center; box-sizing: border-box; background: rgba(255,255,255,0.5);
        }

        /* Lista de Items Scrollable */
        .scroll-area { max-height: 30vh; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; border: 1px inset var(--borde-pergamino); background: rgba(255,255,255,0.3); border-radius: 5px; padding: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin-bottom: 6px; background: white; border-radius: 5px; border-bottom: 2px solid var(--borde-pergamino); }
        .item .name { font-weight: bold; font-size: 0.9rem; color: #444; font-family: var(--fuente-titulo); }
        input[type="number"] { width: 50px; padding: 6px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-family: var(--fuente-texto); }

        /* Sección de Tribu y Especiales */
        .section-title { font-size: 0.8rem; font-weight: bold; color: var(--color-vino); margin: 15px 0 5px; text-transform: uppercase; font-family: var(--fuente-titulo); }
        .grid-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .score-card { padding: 10px; border-radius: 8px; color: white; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        
        /* Colores de las tarjetas */
        .bg-plus { background: #2e7d32; } /* Verde bosque */
        .bg-minus { background: #c62828; } /* Rojo ladrillo */
        .bg-tribu { background: var(--color-vino); }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 5px; }
        .btn-circle { width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(255,255,255,0.3); color: white; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        
        /* Total */
        .footer { border-top: 2px solid var(--color-vino); padding-top: 10px; text-align: center; margin-top: 10px; }
        #displayName { 
            font-size: 1.2rem; font-family: var(--fuente-titulo); font-weight: bold; color: white; 
            background: var(--color-negro); padding: 5px 20px; border-radius: 5px; display: inline-block; margin-bottom: 5px; 
        }
        #total-score { font-size: 3.5rem; font-weight: bold; color: var(--color-vino); margin: 0; font-family: var(--fuente-texto); }
        .reset-btn { background: var(--color-negro); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: var(--fuente-texto); }
    </style>
</head>
<body>

<div class="container">
    <h1>Éxodo Sagrada Familia</h1>
    
    <div class="name-section">
        <label class="name-label">Nombre de la Tribu:</label>
        <input type="text" id="input-nombre" placeholder="BENJAMÍN" oninput="actualizarNombre(); calcular()">
    </div>

    <div class="scroll-area" id="lista-items"></div>

    <div class="section-title">Bonos y Disciplina</div>
    <div class="grid-scores">
        <div class="score-card bg-plus">
            <span>PUNTOS MÁS (+15)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarExtra('mas', -1)">-</button>
                <b id="val-mas">0</b>
                <button class="btn-circle" onclick="cambiarExtra('mas', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-minus">
            <span>PUNTOS MENOS (-20)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarExtra('menos', -1)">-</button>
                <b id="val-menos">0</b>
                <button class="btn-circle" onclick="cambiarExtra('menos', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section-title">Resultados Tribu Zabulón</div>
    <div class="grid-scores">
        <div class="score-card bg-tribu">
            <span>1er LUGAR (+100)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g1', -1)">-</button>
                <b id="val-g1">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g1', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu">
            <span>2do LUGAR (+50)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g2', -1)">-</button>
                <b id="val-g2">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g2', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu" style="opacity: 0.85;">
            <span>3er LUGAR (+25)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g3', -1)">-</button>
                <b id="val-g3">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g3', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu" style="opacity: 0.85;">
            <span>PARTICIPAR (+15)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('part', -1)">-</button>
                <b id="val-part">0</b>
                <button class="btn-circle" onclick="cambiarTribu('part', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="displayNameContainer">
            <span id="displayName">MI CUENTA</span>
        </div>
        <div id="total-score">0</div>
        <button class="reset-btn" onclick="resetear()">Limpiar Todo</button>
    </div>
</div>

<script>
    const items = [
        { nombre: "Biblia", pts: 100 }, { nombre: "Invitado", pts: 100 },
        { nombre: "Botiquín", pts: 50 }, { nombre: "Pañoleta", pts: 20 },
        { nombre: "Paliacate", pts: 10 }, { nombre: "Banderín", pts: 10 },
        { nombre: "Playera", pts: 5 }, { nombre: "Pantalón", pts: 5 },
        { nombre: "Tenis", pts: 5 }, { nombre: "Piola", pts: 5 },
        { nombre: "Libreta", pts: 5 }, { nombre: "Material", pts: 5 },
        { nombre: "Pluma", pts: 1 }
    ];

    let extras = { mas: 0, menos: 0 };
    let tribu = { g1: 0, g2: 0, g3: 0, part: 0 };

    const listaContainer = document.getElementById('lista-items');
    items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span class="name">${item.nombre}</span><input type="number" id="input-${index}" value="0" min="0" oninput="calcular()">`;
        listaContainer.appendChild(div);
    });

    function actualizarNombre() {
        const nombreInput = document.getElementById('input-nombre').value;
        const displayName = document.getElementById('displayName');
        displayName.innerText = nombreInput.trim() !== "" ? nombreInput : "MI CUENTA";
    }

    function cambiarExtra(t, v) {
        extras[t] = Math.max(0, extras[t] + v);
        document.getElementById(`val-${t}`).innerText = extras[t];
        calcular();
    }

    function cambiarTribu(t, v) {
        tribu[t] = Math.max(0, tribu[t] + v);
        document.getElementById(`val-${t}`).innerText = tribu[t];
        calcular();
    }

    function calcular() {
        let total = 0;
        items.forEach((item, index) => {
            total += (parseInt(document.getElementById(`input-${index}`).value) || 0) * item.pts;
        });
        total += (extras.mas * 15) - (extras.menos * 20);
        total += (tribu.g1 * 100) + (tribu.g2 * 50) + (tribu.g3 * 25) + (tribu.part * 15);
        document.getElementById('total-score').innerText = total;
    }

    function resetear() {
        items.forEach((_, i) => document.getElementById(`input-${i}`).value = 0);
        extras = { mas: 0, menos: 0 }; tribu = { g1: 0, g2: 0, g3: 0, part: 0 };
        ['mas', 'menos', 'g1', 'g2', 'g3', 'part'].forEach(id => document.getElementById(`val-${id}`).innerText = 0);
        document.getElementById('input-nombre').value = "";
        actualizarNombre();
        calcular();
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
