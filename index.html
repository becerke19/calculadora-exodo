<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Calculadora de Puntos Éxodo</title>
    <style>
        :root { --primary: #2196F3; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { background: white; max-width: 450px; margin: 0 auto; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .scroll-area { max-height: 60vh; overflow-y: auto; padding-right: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid var(--primary); }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: bold; color: #444; text-transform: capitalize; }
        .pts { font-size: 0.8rem; color: #777; }
        input { width: 60px; padding: 8px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; }
        .footer { margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; text-align: center; }
        .total-label { font-size: 0.9rem; color: #666; letter-spacing: 1px; }
        #total-score { font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
        button { background: #ff5252; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Puntos</h1>
    
    <div class="scroll-area" id="lista-items">
        </div>

    <div class="footer">
        <div class="total-label">PUNTUACIÓN TOTAL</div>
        <div id="total-score">0</div>
        <button onclick="resetear()">Limpiar Todo</button>
    </div>
</div>

<script>
    // Configuración de los puntos
    const items = [
        { nombre: "Biblia", pts: 100 },
        { nombre: "Invitado", pts: 100 },
        { nombre: "Botiquín", pts: 50 },
        { nombre: "Pañoleta", pts: 20 },
        { nombre: "Paliacate", pts: 10 },
        { nombre: "Banderín", pts: 10 },
        { nombre: "Playera", pts: 5 },
        { nombre: "Pantalón", pts: 5 },
        { nombre: "Tenis", pts: 5 },
        { nombre: "Piola", pts: 5 },
        { nombre: "Libreta", pts: 5 },
        { nombre: "Material", pts: 5 },
        { nombre: "Pluma", pts: 1 }
    ];

    const listaContainer = document.getElementById('lista-items');

    // Generar la lista dinámicamente
    items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="info">
                <span class="name">${item.nombre}</span>
                <span class="pts">${item.pts} pts c/u</span>
            </div>
            <input type="number" id="input-${index}" value="0" min="0" oninput="calcular()">
        `;
        listaContainer.appendChild(div);
    });

    function calcular() {
        let total = 0;
        items.forEach((item, index) => {
            const cant = parseInt(document.getElementById(`input-${index}`).value) || 0;
            total += (cant * item.pts);
        });
        document.getElementById('total-score').innerText = total;
    }

    function resetear() {
        items.forEach((_, index) => {
            document.getElementById(`input-${index}`).value = 0;
        });
        calcular();
    }

    // Registro de Service Worker para modo OFFLINE
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
