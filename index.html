<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Éxodo Safa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --primary: #FF3D00;
            --primary-gradient: linear-gradient(135deg, #FF3D00, #FF9100);
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }

        /* Sistema de Pestañas (Tabs) */
        .tabs-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 10px; }
        .tab { background: var(--card-bg); padding: 8px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; white-space: nowrap; font-size: 0.8rem; }
        .tab.active { background: var(--primary-gradient); border: none; font-weight: bold; }
        .add-tab { background: #333; color: white; border-radius: 50%; width: 35px; height: 35px; border: none; font-size: 1.5rem; cursor: pointer; flex-shrink: 0; }

        .container { background-color: var(--card-bg); max-width: 450px; margin: 0 auto; border-radius: 25px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        h1 { text-align: center; font-weight: 800; font-size: 1.4rem; margin: 0 0 15px 0; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .name-section input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 2px solid transparent; border-radius: 12px; color: white; text-align: center; font-weight: bold; outline: none; margin-bottom: 15px; }
        .name-section input:focus { border-color: var(--primary); }

        /* Items con Botones +/- */
        .scroll-area { max-height: 35vh; overflow-y: auto; margin-bottom: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; }
        .item-info b { font-size: 0.9rem; display: block; }
        .item-info span { font-size: 0.7rem; color: var(--text-muted); }
        
        .counter-group { display: flex; align-items: center; gap: 12px; }
        .btn-step { width: 32px; height: 32px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-weight: bold; cursor: pointer; }
        .btn-step:active { transform: scale(0.9); background: var(--primary); }
        .count-val { min-width: 20px; text-align: center; font-weight: bold; color: var(--primary); }

        /* Grid de Bonos */
        .grid-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .score-card { padding: 12px; border-radius: 15px; text-align: center; color: white; }
        .bg-plus { background: linear-gradient(135deg, #00C853, #64DD17); }
        .bg-minus { background: linear-gradient(135deg, #D50000, #FF1744); }
        .bg-tribu { background: #2979FF; }

        /* Footer */
        .footer { text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        #total-score { font-size: 3.5rem; font-weight: 800; margin: 0; line-height: 1; }
        .reset-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #333; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs-container" id="tabs-list">
    </div>
<button class="add-tab" onclick="addNewSession()">+</button>

<div class="container">
    <h1>Puntuaciones Safa</h1>
    
    <div class="name-section">
        <input type="text" id="input-nombre" placeholder="NOMBRE DE OPERACIÓN" oninput="saveCurrentData()">
    </div>

    <div class="scroll-area" id="items-list"></div>

    <div class="grid-scores">
        <div class="score-card bg-plus">
            <span style="font-size: 0.7rem; font-weight: bold;">PUNTOS MÁS (+15)</span>
            <div class="counter-group" style="justify-content: center; margin-top: 5px;">
                <button class="btn-step" onclick="updateExtra('mas', -1)">-</button>
                <b id="val-mas">0</b>
                <button class="btn-step" onclick="updateExtra('mas', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-minus">
            <span style="font-size: 0.7rem; font-weight: bold;">PUNTOS MENOS (-20)</span>
            <div class="counter-group" style="justify-content: center; margin-top: 5px;">
                <button class="btn-step" onclick="updateExtra('menos', -1)">-</button>
                <b id="val-menos">0</b>
                <button class="btn-step" onclick="updateExtra('menos', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="total-score">0</div>
        <button class="reset-btn" onclick="resetCurrent()">Limpiar Actual</button>
    </div>
</div>

<script>
    const itemConfig = [
        { id: 'biblia', name: "Biblia", pts: 100 }, { id: 'invitado', name: "Invitado", pts: 100 },
        { id: 'botiquin', name: "Botiquín", pts: 50 }, { id: 'pañoleta', name: "Pañoleta", pts: 20 },
        { id: 'paliacate', name: "Paliacate", pts: 10 }, { id: 'piola', name: "Piola", pts: 5 }
    ];

    let sessions = JSON.parse(localStorage.getItem('exodo_sessions')) || [createEmptySession("Operación 1")];
    let activeIdx = 0;

    function createEmptySession(name) {
        let counts = {};
        itemConfig.forEach(i => counts[i.id] = 0);
        return { name, counts, extras: { mas: 0, menos: 0 } };
    }

    function renderItems() {
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        itemConfig.forEach(item => {
            const val = sessions[activeIdx].counts[item.id] || 0;
            list.innerHTML += `
                <div class="item">
                    <div class="item-info"><b>${item.name}</b><span>${item.pts} pts</span></div>
                    <div class="counter-group">
                        <button class="btn-step" onclick="updateCount('${item.id}', -1)">-</button>
                        <span class="count-val">${val}</span>
                        <button class="btn-step" onclick="updateCount('${item.id}', 1)">+</button>
                    </div>
                </div>`;
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabs-list');
        container.innerHTML = '';
        sessions.forEach((s, idx) => {
            container.innerHTML += `<div class="tab ${idx === activeIdx ? 'active' : ''}" onclick="switchSession(${idx})">${s.name || 'Sin nombre'}</div>`;
        });
    }

    function switchSession(idx) { activeIdx = idx; loadActiveSession(); }

    function addNewSession() {
        sessions.push(createEmptySession("Operación " + (sessions.length + 1)));
        activeIdx = sessions.length - 1;
        loadActiveSession();
    }

    function loadActiveSession() {
        const s = sessions[activeIdx];
        document.getElementById('input-nombre').value = s.name;
        document.getElementById('val-mas').innerText = s.extras.mas;
        document.getElementById('val-menos').innerText = s.extras.menos;
        renderTabs();
        renderItems();
        calculate();
    }

    function updateCount(id, val) {
        sessions[activeIdx].counts[id] = Math.max(0, (sessions[activeIdx].counts[id] || 0) + val);
        saveAndRender();
    }

    function updateExtra(type, val) {
        sessions[activeIdx].extras[type] = Math.max(0, (sessions[activeIdx].extras[type] || 0) + val);
        document.getElementById('val-' + type).innerText = sessions[activeIdx].extras[type];
        saveAndRender();
    }

    function saveCurrentData() {
        sessions[activeIdx].name = document.getElementById('input-nombre').value;
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('exodo_sessions', JSON.stringify(sessions));
        renderItems();
        renderTabs();
        calculate();
    }

    function calculate() {
        let total = 0;
        const s = sessions[activeIdx];
        itemConfig.forEach(i => total += (s.counts[i.id] || 0) * i.pts);
        total += (s.extras.mas * 15) - (s.extras.menos * 20);
        document.getElementById('total-score').innerText = total;
    }

    function resetCurrent() {
        sessions[activeIdx] = createEmptySession("Operación " + (activeIdx + 1));
        loadActiveSession();
    }

    // Inicializar
    loadActiveSession();
</script>
</body>
</html>
