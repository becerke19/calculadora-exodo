<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Calculadora Éxodo Pro</title>
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --danger: #f44336; --warning: #ff9800; --bg: #f0f2f5; --tribu: #673AB7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { background: white; max-width: 450px; margin: 0 auto; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.2rem; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        
        /* Sección de Nombre */
        .name-section { margin-bottom: 15px; }
        label.name-label { font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"]#input-nombre { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }

        /* Lista de Items */
        .scroll-area { max-height: 35vh; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 6px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid var(--primary); }
        .item .name { font-weight: bold; font-size: 0.9rem; color: #444; }
        input[type="number"] { width: 50px; padding: 6px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }

        /* Sección de Tribu y Especiales */
        .section-title { font-size: 0.8rem; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        .grid-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .score-card { padding: 10px; border-radius: 12px; color: white; text-align: center; }
        .bg-plus { background: var(--success); }
        .bg-minus { background: var(--danger); }
        .bg-tribu { background: var(--tribu); }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 5px; }
        .btn-circle { width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(255,255,255,0.3); color: white; font-weight: bold; cursor: pointer; }
        
        /* Total */
        .footer { border-top: 2px solid #eee; padding-top: 10px; text-align: center; }
        #displayName { font-size: 1.1rem; font-weight: bold; color: #555; text-transform: uppercase; background: #e3f2fd; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 5px; }
        #total-score { font-size: 3.2rem; font-weight: bold; color: var(--primary); margin: 0; }
        .reset-btn { background: #666; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Puntos Éxodo Pro</h1>
    
    <div class="name-section">
        <label class="name-label" for="input-nombre">Nombre de la Tribu / Exodito:</label>
        <input type="text" id="input-nombre" placeholder="Ej: BENJAMÍN" oninput="actualizarNombre(); calcular()">
    </div>

    <div class="scroll-area" id="lista-items"></div>

    <div class="section-title">Bonos y Disciplina</div>
    <div class="grid-scores">
        <div class="score-card bg-plus">
            <span>PUNTOS MÁS (+15)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarExtra('mas', -1)">-</button>
                <b id="val-mas">0</b>
                <button class="btn-circle" onclick="cambiarExtra('mas', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-minus">
            <span>PUNTOS MENOS (-20)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarExtra('menos', -1)">-</button>
                <b id="val-menos">0</b>
                <button class="btn-circle" onclick="cambiarExtra('menos', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section-title">Resultados Tribu Zabulón</div>
    <div class="grid-scores">
        <div class="score-card bg-tribu">
            <span>1er LUGAR (+100)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g1', -1)">-</button>
                <b id="val-g1">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g1', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu">
            <span>2do LUGAR (+50)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g2', -1)">-</button>
                <b id="val-g2">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g2', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu" style="background: #9C27B0;">
            <span>3er LUGAR (+25)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('g3', -1)">-</button>
                <b id="val-g3">0</b>
                <button class="btn-circle" onclick="cambiarTribu('g3', 1)">+</button>
            </div>
        </div>
        <div class="score-card bg-tribu" style="background: #9C27B0;">
            <span>PARTICIPAR (+15)</span>
            <div class="controls">
                <button class="btn-circle" onclick="cambiarTribu('part', -1)">-</button>
                <b id="val-part">0</b>
                <button class="btn-circle" onclick="cambiarTribu('part', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="displayNameContainer">
            <span id="displayName">MI CUENTA</span>
        </div>
        <div id="total-score">0</div>
        <button class="reset-btn" onclick="resetear()">Limpiar Todo</button>
    </div>
</div>

<script>
    const items = [
        { nombre: "Biblia", pts: 100 }, { nombre: "Invitado", pts: 100 },
        { nombre: "Botiquín", pts: 50 }, { nombre: "Pañoleta", pts: 20 },
        { nombre: "Paliacate", pts: 10 }, { nombre: "Banderín", pts: 10 },
        { nombre: "Playera", pts: 5 }, { nombre: "Pantalón", pts: 5 },
        { nombre: "Tenis", pts: 5 }, { nombre: "Piola", pts: 5 },
        { nombre: "Libreta", pts: 5 }, { nombre: "Material", pts: 5 },
        { nombre: "Pluma", pts: 1 }
    ];

    let extras = { mas: 0, menos: 0 };
    let tribu = { g1: 0, g2: 0, g3: 0, part: 0 };

    const listaContainer = document.getElementById('lista-items');
    items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span class="name">${item.nombre}</span><input type="number" id="input-${index}" value="0" min="0" oninput="calcular()">`;
        listaContainer.appendChild(div);
    });

    function actualizarNombre() {
        const nombreInput = document.getElementById('input-nombre').value;
        const displayName = document.getElementById('displayName');
        
        if (nombreInput.trim() !== "") {
            displayName.innerText = nombreInput;
        } else {
            displayName.innerText = "MI CUENTA";
        }
    }

    function cambiarExtra(t, v) {
        extras[t] = Math.max(0, extras[t] + v);
        document.getElementById(`val-${t}`).innerText = extras[t];
        calcular();
    }

    function cambiarTribu(t, v) {
        tribu[t] = Math.max(0, tribu[t] + v);
        document.getElementById(`val-${t}`).innerText = tribu[t];
        calcular();
    }

    function calcular() {
        let total = 0;
        items.forEach((item, index) => {
            total += (parseInt(document.getElementById(`input-${index}`).value) || 0) * item.pts;
        });
        total += (extras.mas * 15) - (extras.menos * 20);
        total += (tribu.g1 * 100) + (tribu.g2 * 50) + (tribu.g3 * 25) + (tribu.part * 15);
        document.getElementById('total-score').innerText = total;
    }

    function resetear() {
        items.forEach((_, i) => document.getElementById(`input-${i}`).value = 0);
        extras = { mas: 0, menos: 0 }; tribu = { g1: 0, g2: 0, g3: 0, part: 0 };
        ['mas', 'menos', 'g1', 'g2', 'g3', 'part'].forEach(id => document.getElementById(`val-${id}`).innerText = 0);
        document.getElementById('input-nombre').value = ""; // Limpiar el nombre
        actualizarNombre(); // Resetear el nombre mostrado
        calcular();
    }

    // Registro de Service Worker para modo OFFLINE
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
        });
    }
</script>
</body>
</html>
